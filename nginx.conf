server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Enable gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml application/octet-stream;
    gzip_min_length 256;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # .sb3 files: CORS headers for TurboWarp embed + long cache
    location ~* \.sb3$ {
        types { application/octet-stream sb3; }
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Range" always;
        add_header Cache-Control "public, max-age=31536000, immutable";
        add_header X-Content-Type-Options "nosniff" always;

        if ($request_method = OPTIONS) {
            return 204;
        }
    }

    # Service worker must not be cached aggressively
    location = /sw.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header X-Content-Type-Options "nosniff" always;
    }

    # Cache static assets (1 day)
    location ~* \.(png|jpg|ico|svg|js|css|json|webmanifest)$ {
        add_header Cache-Control "public, max-age=86400";
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
