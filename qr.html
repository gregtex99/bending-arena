<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bending Arena - QR Code</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: #1a1a2e;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: white;
      padding: 2rem;
    }
    h1 { color: #e94560; font-size: 2rem; margin-bottom: 0.5rem; }
    .subtitle { color: #aaa; margin-bottom: 2rem; }
    #qr-container {
      background: white;
      padding: 24px;
      border-radius: 16px;
      margin-bottom: 2rem;
    }
    #qr-container svg { display: block; }
    .url-display {
      color: #e94560;
      font-size: 1.1rem;
      word-break: break-all;
      text-align: center;
      max-width: 400px;
      margin-bottom: 1rem;
    }
    .instructions {
      color: #666;
      font-size: 0.85rem;
      text-align: center;
      max-width: 400px;
    }
    .edit-section {
      margin-bottom: 2rem;
      text-align: center;
    }
    .edit-section input {
      padding: 10px 16px;
      font-size: 1rem;
      border: 2px solid #e94560;
      border-radius: 8px;
      background: #16213e;
      color: white;
      width: 350px;
      max-width: 90vw;
    }
    .edit-section button {
      padding: 10px 20px;
      font-size: 1rem;
      background: #e94560;
      color: white;
      border: none;
      border-radius: 8px;
      margin-left: 8px;
      cursor: pointer;
    }
  </style>
</head>

  <h1>BENDING ARENA</h1>
  <p class="subtitle">Scan to play on your phone</p>

  <div class="edit-section">
    <input type="text" id="url-input" placeholder="https://your-app.railway.app" value="https://thorough-radiance-production-47bc.up.railway.app">
    <button onclick="generateQR()">Generate</button>
  </div>

  <div id="qr-container"></div>
  <p class="url-display" id="url-display"></p>
  <p class="instructions">
    Open the link in Safari on iPhone, tap Share → "Add to Home Screen" to install as an app.
  </p>

    // Simple QR Code SVG generator
    // Based on https://github.com/nayuki/QR-Code-generator (MIT)
    // Simplified for our use case

    function generateQR() {
      const url = document.getElementById('url-input').value.trim();
      if (!url) return;

      document.getElementById('url-display').textContent = url;

      // Use a simple API approach - generate QR as an SVG via a deterministic algorithm
      // For reliability, we'll use a small inline QR library
      const container = document.getElementById('qr-container');

      // Create QR code using the Canvas API with a simple encoding
      const size = 280;
      const canvas = document.createElement('canvas');
      canvas.width = size;
      canvas.height = size;

      // Use the embedded qr function if available, otherwise fall back to API
      try {
        const svg = window.qr(url);
        if (svg) {
          container.innerHTML = svg;
          container.querySelector('svg').setAttribute('width', size);
          container.querySelector('svg').setAttribute('height', size);
          return;
        }
      } catch(e) {}

      // Fallback: use an image from a QR API (works online)
      container.innerHTML = '<img src="https://api.qrserver.com/v1/create-qr-code/?size=280x280&data=' +

    const input = document.getElementById('url-input');
    if (input.value) generateQR();
