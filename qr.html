<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bending Arena - QR Code</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: #1a1a2e;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: white;
      padding: 2rem;
    }
    h1 { color: #e94560; font-size: 2rem; margin-bottom: 0.5rem; }
    .subtitle { color: #aaa; margin-bottom: 2rem; }
    #qr-container {
      background: white;
      padding: 24px;
      border-radius: 16px;
      margin-bottom: 2rem;
    }
    #qr-container img { display: block; }
    .url-display {
      color: #e94560;
      font-size: 1.1rem;
      word-break: break-all;
      text-align: center;
      max-width: 400px;
      margin-bottom: 1rem;
    }
    .instructions {
      color: #666;
      font-size: 0.85rem;
      text-align: center;
      max-width: 400px;
    }
  </style>
</head>
<body>
  <h1>BENDING ARENA</h1>
  <p class="subtitle">Scan to play on your phone</p>

  <div id="qr-container">
    <img id="qr-img" src="" alt="QR Code" width="280" height="280">
  </div>
  <p class="url-display" id="url-display"></p>
  <p class="instructions">
    Open the link in Safari on iPhone, tap Share → "Add to Home Screen" to install as an app.
  </p>

  <script>
    const APP_URL = 'https://thorough-radiance-production-47bc.up.railway.app';
    document.getElementById('url-display').textContent = APP_URL;
    document.getElementById('qr-img').src = 'https://api.qrserver.com/v1/create-qr-code/?size=280x280&data=' + encodeURIComponent(APP_URL);
  </script>
</body>
</html>
